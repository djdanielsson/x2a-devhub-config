apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: x2a-migration
  title: X2Ansible Migration
  description: Migrate Chef, Puppet, or Salt infrastructure code to Ansible using AI-powered analysis and conversion
  tags:
    - ansible
    - migration
    - ai
    - chef
    - puppet
    - salt
spec:
  owner: x2ansible
  type: tool

  parameters:
    - title: Source Configuration
      required:
        - sourceRepoUrl
        - sourceTechnology
      properties:
        sourceRepoUrl:
          title: Source Repository URL
          type: string
          description: Git URL of the Chef/Puppet/Salt repository to migrate
          ui:placeholder: https://github.com/org/chef-repo.git
        sourceTechnology:
          title: Source Technology
          type: string
          description: The infrastructure-as-code technology to migrate from
          enum:
            - Chef
            - Puppet
            - Salt
          enumNames:
            - Chef
            - Puppet
            - Salt
        sourceBranch:
          title: Source Branch
          type: string
          description: Branch of the source repository to use
          default: main

    - title: Model Selection
      required:
        - llmProvider
        - llmModel
      properties:
        llmProvider:
          title: LLM Provider
          type: string
          description: Select where to run the AI model
          default: ollama
          enum:
            - ollama
            - laptop
          enumNames:
            - Ollama (cluster)
            - Laptop
      dependencies:
        llmProvider:
          oneOf:
            - properties:
                llmProvider:
                  const: ollama
                llmModel:
                  title: AI Model
                  type: string
                  description: Select the Ollama model for migration
                  default: openai/qwen3:14b
                  enum:
                    - openai/qwen3:14b
                    - openai/qwen3:8b
                    - openai/gpt-oss:20b
                    - openai/ministral-3:14b
                    - openai/deepseek-r1:14b
                    - openai/gemma3:12b
                    - openai/llama3.1:8b
                  enumNames:
                    - Qwen3 14B (recommended)
                    - Qwen3 8B (faster)
                    - GPT-OSS 20B
                    - Ministral-3 14B
                    - DeepSeek R1 14B
                    - Gemma3 12B
                    - Llama 3.1 8B
            - properties:
                llmProvider:
                  const: laptop
                llmModel:
                  title: AI Model
                  type: string
                  description: Select the model from your laptop
                  default: google/gemma-4-31b-qat
                  enum:
                    - google/gemma-4-31b-qat
                    - qwen/qwen3.6-35b-a3b
                    - google/gemma-4-e4b
                  enumNames:
                    - Gemma 4 31B QAT
                    - Qwen 3.6 35B A3B
                    - Gemma 4 E4B

    - title: Output Configuration
      required:
        - outputRepoUrl
      properties:
        outputRepoUrl:
          title: Output Repository URL
          type: string
          description: Git repository where migrated Ansible code will be pushed
          ui:placeholder: https://github.com/org/ansible-output.git
        outputBranch:
          title: Output Branch
          type: string
          description: Branch name for the migrated output
          default: x2a-migration

    - title: Advanced Settings
      properties:
        pipelineTimeout:
          title: Pipeline Timeout (hours)
          type: integer
          description: Maximum hours the pipeline can run before being cancelled
          default: 5
          enum:
            - 1
            - 2
            - 3
            - 5
            - 8
            - 12
          enumNames:
            - 1 hour
            - 2 hours
            - 3 hours
            - 5 hours (default)
            - 8 hours
            - 12 hours
        maxTokens:
          title: Max Output Tokens
          type: integer
          description: Maximum tokens per LLM response (higher = longer but more complete output)
          default: 16384
          enum:
            - 4096
            - 8192
            - 16384
            - 32768
          enumNames:
            - 4K (fast, short output)
            - 8K (balanced)
            - 16K (default, recommended)
            - 32K (large output)
        numCtx:
          title: Context Window Size
          type: integer
          description: Input context window in tokens — how much source code the model can see at once
          default: 32768
          enum:
            - 8192
            - 16384
            - 32768
            - 65536
            - 131072
          enumNames:
            - 8K (small models)
            - 16K
            - 32K (default, recommended)
            - 64K (large models)
            - 128K (very large models)

  steps:
    - id: trigger-tekton-pipeline
      name: Trigger X2A Migration Pipeline
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/x2a-trigger
        headers:
          content-type: application/json
        body:
          sourceRepoUrl: ${{ parameters.sourceRepoUrl }}
          sourceBranch: ${{ parameters.sourceBranch }}
          sourceTechnology: ${{ parameters.sourceTechnology }}
          llmProvider: ${{ parameters.llmProvider }}
          llmModel: ${{ parameters.llmModel }}
          outputRepoUrl: ${{ parameters.outputRepoUrl }}
          outputBranch: ${{ parameters.outputBranch }}
          pipelineTimeout: ${{ parameters.pipelineTimeout }}
          maxTokens: ${{ parameters.maxTokens }}
          numCtx: ${{ parameters.numCtx }}

  output:
    links:
      - title: Pipeline Runs
        url: https://console-openshift-console.apps.ocp.new.lab.danielsson.us.com/pipelines/ns/x2a-devhub
      - title: Output Repository
        url: ${{ parameters.outputRepoUrl }}
