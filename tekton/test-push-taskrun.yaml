###############################################################################
# Self-contained test for the git push + PR flow (user-provided token).
#
# Usage:
#   1. Replace REPLACE_WITH_YOUR_GITHUB_TOKEN below
#   2. oc create -f test-push-taskrun.yaml -n x2a-devhub
#   3. oc logs -f $(oc get pod -n x2a-devhub --sort-by=.metadata.creationTimestamp \
#        -l app.kubernetes.io/part-of=x2ansible-test -o name | tail -1) -n x2a-devhub
###############################################################################
apiVersion: tekton.dev/v1
kind: TaskRun
metadata:
  generateName: x2a-test-push-pr-
  namespace: x2a-devhub
  labels:
    app.kubernetes.io/part-of: x2ansible-test
spec:
  taskSpec:
    params:
      - name: git-token
        type: string
      - name: output-repo-url
        type: string
      - name: output-branch
        type: string
      - name: source-technology
        type: string
    steps:
      - name: seed-and-test
        image: alpine:3.20
        env:
          - name: GIT_TOKEN
            value: $(params.git-token)
        script: |
          #!/usr/bin/env sh
          set -eu

          apk add --no-cache git curl jq > /dev/null 2>&1

          OUTPUT_REPO="$(params.output-repo-url)"
          BRANCH="$(params.output-branch)"
          BASE_BRANCH="main"
          TECHNOLOGY="$(params.source-technology)"

          if [ -z "$GIT_TOKEN" ]; then
            echo "FAIL: git-token is empty"
            exit 1
          fi
          echo "Token received (length: ${#GIT_TOKEN}, prefix: $(echo "$GIT_TOKEN" | cut -c1-4)...)"

          OWNER_REPO=$(echo "$OUTPUT_REPO" | sed 's|https://github.com/||; s|\.git$||')
          OWNER=$(echo "$OWNER_REPO" | cut -d/ -f1)
          REPO=$(echo "$OWNER_REPO" | cut -d/ -f2)
          echo "Target: ${OWNER}/${REPO}"

          REPO_INFO=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${GIT_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${OWNER}/${REPO}")
          HTTP_CODE=$(echo "$REPO_INFO" | tail -1)
          REPO_JSON=$(echo "$REPO_INFO" | sed '$d')
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: Token cannot access ${OWNER}/${REPO} (HTTP ${HTTP_CODE})"
            exit 1
          fi
          echo "Token verified: access OK"

          DETECTED=$(echo "$REPO_JSON" | jq -r '.default_branch // "main"')
          if [ "$DETECTED" != "$BASE_BRANCH" ]; then
            echo "Auto-detected default branch: ${DETECTED}"
            BASE_BRANCH="$DETECTED"
          fi

          AUTHED_URL="https://x-access-token:${GIT_TOKEN}@github.com/${OWNER}/${REPO}.git"
          git clone --depth 1 "$AUTHED_URL" /tmp/repo
          cd /tmp/repo

          git config user.email "x2a-bot@x2ansible.io"
          git config user.name "X2A Migration Bot"
          git checkout -b "$BRANCH"

          mkdir -p roles/test/tasks
          cat > roles/test/tasks/main.yml <<'YAML'
          ---
          - name: Test from x2a pipeline
            ansible.builtin.debug:
              msg: "x2a migration test"
          YAML
          echo "test run at $(date -u)" > x2a-marker.txt
          git add -A
          git commit -m "feat: migrate ${TECHNOLOGY} to Ansible via x2a-convertor"

          echo "Pushing branch ${BRANCH}..."
          git push -u origin "$BRANCH" --force
          echo "PASS: Push succeeded"

          PR_TITLE="feat: ${TECHNOLOGY} to Ansible migration"
          EXISTING=$(curl -s \
            -H "Authorization: Bearer ${GIT_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${OWNER}/${REPO}/pulls?head=${OWNER}:${BRANCH}&base=${BASE_BRANCH}&state=open")
          EXISTING_COUNT=$(echo "$EXISTING" | jq 'length')

          if [ "$EXISTING_COUNT" -gt 0 ]; then
            PR_URL=$(echo "$EXISTING" | jq -r '.[0].html_url')
            echo "PR already open (force-push updated it): ${PR_URL}"
          else
            PR_BODY="## X2Ansible Migration (Test)
          Auto-generated by the X2Ansible pipeline test.
          **Source technology:** ${TECHNOLOGY}"

            RESP=$(curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer ${GIT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${OWNER}/${REPO}/pulls" \
              -d "$(jq -n \
                --arg title "$PR_TITLE" \
                --arg body "$PR_BODY" \
                --arg head "$BRANCH" \
                --arg base "$BASE_BRANCH" \
                '{title: $title, body: $body, head: $head, base: $base}')")
            CODE=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | sed '$d')

            if [ "$CODE" = "201" ]; then
              PR_URL=$(echo "$BODY" | jq -r '.html_url')
              echo "PASS: PR created: ${PR_URL}"
            else
              echo "WARN: PR creation returned HTTP ${CODE}"
              echo "$BODY" | jq . 2>/dev/null || echo "$BODY"
            fi
          fi

          echo ""
          echo "=== ALL TESTS PASSED ==="
  params:
    - name: git-token
      value: "REPLACE_WITH_YOUR_GITHUB_TOKEN"
    - name: output-repo-url
      value: "https://github.com/djdanielsson/test.git"
    - name: output-branch
      value: "x2a-push-pr-test"
    - name: source-technology
      value: "Chef"
