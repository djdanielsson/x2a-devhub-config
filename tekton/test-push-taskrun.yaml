###############################################################################
# Test for the git-push-pr task (reads token from x2a-git-token secret).
#
# Prerequisites:
#   oc create secret generic x2a-git-token \
#     --from-literal=token=YOUR_TOKEN -n x2a-devhub
#
# Run:
#   oc create -f test-push-taskrun.yaml -n x2a-devhub
#
# Watch:
#   oc logs -f $(oc get pod -n x2a-devhub --sort-by=.metadata.creationTimestamp \
#     -l app.kubernetes.io/part-of=x2ansible-test -o name | tail -1) -n x2a-devhub
###############################################################################
apiVersion: tekton.dev/v1
kind: TaskRun
metadata:
  generateName: x2a-test-push-pr-
  namespace: x2a-devhub
  labels:
    app.kubernetes.io/part-of: x2ansible-test
spec:
  taskSpec:
    steps:
      - name: seed-and-test
        image: alpine:3.20
        env:
          - name: GIT_TOKEN
            valueFrom:
              secretKeyRef:
                name: x2a-git-token
                key: token
        script: |
          #!/usr/bin/env sh
          set -eu

          apk add --no-cache git curl jq > /dev/null 2>&1

          OUTPUT_REPO="https://github.com/djdanielsson/test.git"
          BRANCH="x2a-push-pr-test"
          BASE_BRANCH="main"

          if [ -z "$GIT_TOKEN" ]; then
            echo "FAIL: GIT_TOKEN is empty"
            exit 1
          fi
          echo "Token from secret (length: ${#GIT_TOKEN}, prefix: $(echo "$GIT_TOKEN" | cut -c1-4)...)"

          OWNER_REPO=$(echo "$OUTPUT_REPO" | sed 's|https://github.com/||; s|\.git$||')
          OWNER=$(echo "$OWNER_REPO" | cut -d/ -f1)
          REPO=$(echo "$OWNER_REPO" | cut -d/ -f2)

          REPO_INFO=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${GIT_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${OWNER}/${REPO}")
          HTTP_CODE=$(echo "$REPO_INFO" | tail -1)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: HTTP ${HTTP_CODE}"
            exit 1
          fi
          echo "PASS: Token works via secret (HTTP 200)"
