apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-cli
  namespace: x2a-devhub
  labels:
    app.kubernetes.io/part-of: x2ansible
spec:
  description: Run a git script
  params:
    - name: GIT_SCRIPT
      type: string
      description: Git commands to execute
    - name: GIT_TOKEN
      type: string
      default: ""
      description: Git token passed as env var (avoids inline redaction)
  workspaces:
    - name: source
      description: Workspace containing the repository
  steps:
    - name: git
      image: alpine/git:2.45.2
      workingDir: $(workspaces.source.path)
      env:
        - name: GIT_TOKEN
          value: $(params.GIT_TOKEN)
      script: |
        #!/usr/bin/env sh
        set -eu
        $(params.GIT_SCRIPT)
