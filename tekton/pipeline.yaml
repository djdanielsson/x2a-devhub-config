apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: x2a-migration
  namespace: x2a-devhub
  labels:
    app.kubernetes.io/part-of: x2ansible
    backstage.io/kubernetes-id: x2a-convertor
spec:
  description: Full X2Ansible migration pipeline (init -> analyze -> migrate -> push)
  params:
    - name: source-repo-url
      type: string
      description: Git URL of the source Chef/Puppet/Salt repository
    - name: source-branch
      type: string
      default: main
      description: Branch of the source repository
    - name: source-technology
      type: string
      default: Chef
      description: Source technology (Chef, Puppet, Salt)
    - name: llm-provider
      type: string
      default: ollama
      description: LLM provider (ollama or laptop)
    - name: llm-model
      type: string
      default: openai/qwen3:14b
      description: Model to use
    - name: output-repo-url
      type: string
      description: Git repository for migrated Ansible output
    - name: output-branch
      type: string
      default: x2a-migration
      description: Branch for the migrated output
    - name: git-token
      type: string
      description: Git PAT for pushing to the output repository
    - name: max-tokens
      type: string
      default: "16384"
      description: Maximum tokens per LLM response
    - name: num-ctx
      type: string
      default: "32768"
      description: Input context window size in tokens
  workspaces:
    - name: shared-workspace
      description: Shared workspace for source code across pipeline tasks
  tasks:
    - name: clone-source
      taskRef:
        name: git-clone
      workspaces:
        - name: output
          workspace: shared-workspace
      params:
        - name: url
          value: $(params.source-repo-url)
        - name: revision
          value: $(params.source-branch)

    - name: init
      timeout: "2h"
      runAfter:
        - clone-source
      taskRef:
        name: x2a-convertor
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: source-repo-url
          value: $(params.source-repo-url)
        - name: source-branch
          value: $(params.source-branch)
        - name: source-technology
          value: $(params.source-technology)
        - name: phase
          value: init
        - name: llm-provider
          value: $(params.llm-provider)
        - name: llm-model
          value: $(params.llm-model)
        - name: max-tokens
          value: $(params.max-tokens)
        - name: num-ctx
          value: $(params.num-ctx)

    - name: analyze
      timeout: "2h"
      runAfter:
        - init
      taskRef:
        name: x2a-convertor
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: source-repo-url
          value: $(params.source-repo-url)
        - name: source-branch
          value: $(params.source-branch)
        - name: source-technology
          value: $(params.source-technology)
        - name: phase
          value: analyze
        - name: llm-provider
          value: $(params.llm-provider)
        - name: llm-model
          value: $(params.llm-model)
        - name: max-tokens
          value: $(params.max-tokens)
        - name: num-ctx
          value: $(params.num-ctx)

    - name: migrate
      timeout: "3h"
      runAfter:
        - analyze
      taskRef:
        name: x2a-convertor
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: source-repo-url
          value: $(params.source-repo-url)
        - name: source-branch
          value: $(params.source-branch)
        - name: source-technology
          value: $(params.source-technology)
        - name: phase
          value: migrate
        - name: llm-provider
          value: $(params.llm-provider)
        - name: llm-model
          value: $(params.llm-model)
        - name: max-tokens
          value: $(params.max-tokens)
        - name: num-ctx
          value: $(params.num-ctx)

    - name: push-results
      runAfter:
        - migrate
      taskRef:
        name: git-push-pr
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: output-repo-url
          value: $(params.output-repo-url)
        - name: output-branch
          value: $(params.output-branch)
        - name: source-technology
          value: $(params.source-technology)
        - name: git-token
          value: $(params.git-token)
