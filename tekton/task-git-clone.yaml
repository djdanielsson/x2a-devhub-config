apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: x2a-devhub
  labels:
    app.kubernetes.io/part-of: x2ansible
spec:
  description: Clone a git repository
  params:
    - name: url
      type: string
      description: Repository URL to clone
    - name: revision
      type: string
      default: main
      description: Revision to checkout
  workspaces:
    - name: output
      description: Workspace to clone into
  steps:
    - name: clone
      image: alpine/git:2.45.2
      script: |
        #!/usr/bin/env sh
        set -eu
        cd "$(workspaces.output.path)"
        git init
        git remote add origin "$(params.url)"
        git fetch --depth 1 origin "$(params.revision)"
        git checkout FETCH_HEAD
