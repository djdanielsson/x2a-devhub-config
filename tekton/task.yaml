apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: x2a-convertor
  namespace: x2a-devhub
  labels:
    app.kubernetes.io/part-of: x2ansible
spec:
  description: Run x2a-convertor to migrate Chef/Puppet/Salt code to Ansible
  params:
    - name: source-repo-url
      type: string
      description: Git URL of the source repository
    - name: source-branch
      type: string
      default: main
      description: Branch of the source repository
    - name: source-technology
      type: string
      default: Chef
      description: Source technology (Chef, Puppet, Salt)
    - name: phase
      type: string
      description: Migration phase to run (init, analyze, migrate)
    - name: module-migration-plan
      type: string
      default: ""
      description: Module migration plan filename (for migrate phase)
    - name: high-level-migration-plan
      type: string
      default: migration-plan.md
      description: High-level migration plan filename (for migrate phase)
    - name: llm-provider
      type: string
      default: ollama
      description: LLM provider (ollama, maas, ollama-laptop, or laptop)
    - name: llm-model
      type: string
      default: openai/qwen3:14b
      description: Model to use
    - name: max-tokens
      type: string
      default: "16384"
      description: Maximum tokens per LLM response
    - name: num-ctx
      type: string
      default: "32768"
      description: Input context window size in tokens
  workspaces:
    - name: source
      description: Workspace containing the cloned source repository
  steps:
    - name: run-x2a
      image: quay.io/x2ansible/x2a-convertor:latest
      workingDir: $(workspaces.source.path)
      env:
        - name: LLM_MODEL
          value: $(params.llm-model)
        - name: OPENAI_API_KEY
          value: not-needed
        - name: MAX_TOKENS
          value: $(params.max-tokens)
        - name: MAAS_API_KEY
          valueFrom:
            secretKeyRef:
              name: x2a-maas-api-key
              key: api-key
              optional: true
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        NUM_CTX="$(params.num-ctx)"
        OLLAMA_HOST="http://ollama.ollama.svc.cluster.local:11434"

        LAPTOP_OLLAMA="http://192.168.2.186:11434"

        case "$(params.llm-provider)" in
          laptop)  export OPENAI_API_BASE="http://192.168.2.186:1234/v1" ;;
          ollama-laptop)
            export OPENAI_API_BASE="${LAPTOP_OLLAMA}/v1"

            OLLAMA_MODEL=$(echo "$(params.llm-model)" | sed 's|^openai/||')
            echo "Loading model ${OLLAMA_MODEL} on laptop Ollama with num_ctx=${NUM_CTX}..."
            curl -sf "${LAPTOP_OLLAMA}/api/generate" \
              -d "{\"model\":\"${OLLAMA_MODEL}\",\"prompt\":\"hi\",\"options\":{\"num_ctx\":${NUM_CTX}},\"stream\":false}" \
              > /dev/null 2>&1 || echo "Warning: could not pre-load model with num_ctx"
            ;;
          maas)
            if [ -z "${MAAS_API_KEY:-}" ]; then
              echo "ERROR: MAAS_API_KEY is empty. Ensure the x2a-maas-api-key secret exists."
              echo "Add 'maas-api-key' field to the ocp-lab/x2a-devhub Bitwarden item."
              exit 1
            fi
            export OPENAI_API_BASE="https://maas-rhdp.apps.maas.redhatworkshops.io/v1"
            export OPENAI_API_KEY="${MAAS_API_KEY}"
            echo "Using MAAS endpoint with model $(params.llm-model)"
            ;;
          *)
            export OPENAI_API_BASE="${OLLAMA_HOST}/v1"

            # Strip openai/ prefix for Ollama native API
            OLLAMA_MODEL=$(echo "$(params.llm-model)" | sed 's|^openai/||')

            echo "Loading model ${OLLAMA_MODEL} with num_ctx=${NUM_CTX}..."
            curl -sf "${OLLAMA_HOST}/api/generate" \
              -d "{\"model\":\"${OLLAMA_MODEL}\",\"prompt\":\"hi\",\"options\":{\"num_ctx\":${NUM_CTX}},\"stream\":false}" \
              > /dev/null 2>&1 || echo "Warning: could not pre-load model with num_ctx"
            ;;
        esac

        PHASE="$(params.phase)"
        SOURCE_DIR="$(workspaces.source.path)"
        TECHNOLOGY="$(params.source-technology)"

        X2A="/app/.venv/bin/python /app/app.py"

        case "$PHASE" in
          init)
            $X2A init \
              --source-dir "$SOURCE_DIR" \
              "Migrate this $TECHNOLOGY repository to Ansible"
            ;;
          analyze)
            $X2A analyze \
              --source-dir "$SOURCE_DIR" \
              "Analyze all modules for migration"
            ;;
          migrate)
            MODULE_PLAN="$(params.module-migration-plan)"
            HIGH_PLAN="$(params.high-level-migration-plan)"

            if [ -z "$MODULE_PLAN" ]; then
              for plan in "$SOURCE_DIR"/migration-plan-*.md; do
                [ -f "$plan" ] || continue
                module=$(basename "$plan" .md | sed 's/^migration-plan-//')
                $X2A migrate \
                  --source-dir "$SOURCE_DIR" \
                  --source-technology "$TECHNOLOGY" \
                  --high-level-migration-plan "$HIGH_PLAN" \
                  --module-migration-plan "$(basename "$plan")" \
                  "Convert $module"
              done
            else
              module=$(echo "$MODULE_PLAN" | sed 's/^migration-plan-//' | sed 's/\.md$//')
              $X2A migrate \
                --source-dir "$SOURCE_DIR" \
                --source-technology "$TECHNOLOGY" \
                --high-level-migration-plan "$HIGH_PLAN" \
                --module-migration-plan "$MODULE_PLAN" \
                "Convert $module"
            fi
            ;;
          *)
            echo "Unknown phase: $PHASE"
            exit 1
            ;;
        esac
